name: NestJS CI

on:
    push:
        branches:
            - development
            - master
    pull_request:
        branches:
            - development
            - master

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Use Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 24.13.1 # 20.19
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Generate Prisma Client
              run: npx prisma generate
            # - name: Run lint
            #   run: npm run lint

            - name: Run tests
              run: npm run test

            - name: Build project
              run: npm run build
